<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#ff6b6b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid pattern decoration -->
  <g opacity="0.03" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Glow behind monitors -->
  <rect x="160" y="140" width="960" height="160" rx="80" fill="url(#glow)"/>

  <!-- Monitor 1 (left) -->
  <g filter="url(#shadow)" transform="translate(180, 160)">
    <rect x="0" y="0" width="200" height="130" rx="6" fill="#0d1b2a" stroke="#e94560" stroke-width="1.5"/>
    <rect x="8" y="8" width="184" height="104" rx="2" fill="#1a1a2e"/>
    <!-- Screen content -->
    <rect x="16" y="16" width="60" height="40" rx="3" fill="#e94560" opacity="0.4"/>
    <rect x="84" y="16" width="100" height="18" rx="2" fill="#fff" opacity="0.1"/>
    <rect x="84" y="40" width="80" height="18" rx="2" fill="#fff" opacity="0.07"/>
    <rect x="16" y="64" width="168" height="40" rx="3" fill="#fff" opacity="0.03"/>
    <rect x="16" y="64" width="40" height="40" rx="3" fill="#533483" opacity="0.3"/>
    <rect x="62" y="64" width="122" height="14" rx="2" fill="#fff" opacity="0.05"/>
    <rect x="62" y="82" width="90" height="14" rx="2" fill="#fff" opacity="0.03"/>
    <!-- Stand -->
    <rect x="85" y="130" width="30" height="20" rx="2" fill="#1a1a2e"/>
    <rect x="70" y="148" width="60" height="6" rx="3" fill="#1a1a2e"/>
  </g>

  <!-- Monitor 2 (center, larger) -->
  <g filter="url(#shadow)" transform="translate(420, 130)">
    <rect x="0" y="0" width="260" height="170" rx="8" fill="#0d1b2a" stroke="#e94560" stroke-width="2"/>
    <rect x="10" y="10" width="240" height="140" rx="3" fill="#1a1a2e"/>
    <!-- Screen content - media layout -->
    <rect x="18" y="18" width="100" height="70" rx="3" fill="#e94560" opacity="0.3"/>
    <text x="68" y="58" font-family="sans-serif" font-size="10" fill="#fff" opacity="0.6" text-anchor="middle">▶</text>
    <rect x="126" y="18" width="116" height="32" rx="3" fill="#533483" opacity="0.3"/>
    <rect x="126" y="56" width="116" height="32" rx="3" fill="#0f3460" opacity="0.4"/>
    <text x="184" y="76" font-family="sans-serif" font-size="8" fill="#fff" opacity="0.4" text-anchor="middle">RSS NEWS</text>
    <rect x="18" y="96" width="224" height="46" rx="3" fill="#fff" opacity="0.03"/>
    <rect x="26" y="104" width="50" height="30" rx="2" fill="#e94560" opacity="0.2"/>
    <rect x="84" y="104" width="50" height="30" rx="2" fill="#fff" opacity="0.08"/>
    <rect x="142" y="104" width="50" height="30" rx="2" fill="#533483" opacity="0.2"/>
    <rect x="200" y="104" width="34" height="30" rx="2" fill="#fff" opacity="0.05"/>
    <!-- Stand -->
    <rect x="115" y="170" width="30" height="22" rx="2" fill="#1a1a2e"/>
    <rect x="98" y="190" width="64" height="6" rx="3" fill="#1a1a2e"/>
  </g>

  <!-- Monitor 3 (right) -->
  <g filter="url(#shadow)" transform="translate(720, 160)">
    <rect x="0" y="0" width="200" height="130" rx="6" fill="#0d1b2a" stroke="#e94560" stroke-width="1.5"/>
    <rect x="8" y="8" width="184" height="104" rx="2" fill="#1a1a2e"/>
    <!-- Screen content -->
    <rect x="16" y="16" width="168" height="24" rx="3" fill="#fff" opacity="0.06"/>
    <circle cx="32" cy="28" r="6" fill="#e94560" opacity="0.5"/>
    <circle cx="48" cy="28" r="6" fill="#533483" opacity="0.5"/>
    <circle cx="64" cy="28" r="6" fill="#0f3460" opacity="0.5"/>
    <rect x="16" y="48" width="80" height="56" rx="3" fill="#533483" opacity="0.25"/>
    <rect x="104" y="48" width="80" height="24" rx="2" fill="#fff" opacity="0.05"/>
    <rect x="104" y="78" width="80" height="24" rx="2" fill="#e94560" opacity="0.1"/>
    <!-- Stand -->
    <rect x="85" y="130" width="30" height="20" rx="2" fill="#1a1a2e"/>
    <rect x="70" y="148" width="60" height="6" rx="3" fill="#1a1a2e"/>
  </g>

  <!-- Connection lines between monitors -->
  <line x1="380" y1="225" x2="420" y2="215" stroke="#e94560" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>
  <line x1="680" y1="215" x2="720" y2="225" stroke="#e94560" stroke-width="1.5" opacity="0.4" stroke-dasharray="4,4"/>

  <!-- Title -->
  <text x="640" y="430" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="48" font-weight="700" fill="#fff" text-anchor="middle" filter="url(#glowFilter)">MediaControlDistributionCenter</text>
  <text x="640" y="470" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="18" fill="#8899aa" text-anchor="middle" letter-spacing="6">M C D C</text>

  <!-- Subtitle -->
  <text x="640" y="510" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="14" fill="#667788" text-anchor="middle">Digital Signage — Media Control &amp; Distribution</text>

  <!-- Bottom accent line -->
  <rect x="540" y="530" width="200" height="2" rx="1" fill="url(#accent)"/>
</svg>
